version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: travel-memory-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: travel-memory-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/travel-memory
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: travel-memory-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

volumes:
  mongodb_data: