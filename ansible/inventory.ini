[web]
web_server ansible_host=<WEB_SERVER_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/demo.pem

[db]
db_server ansible_host=<DB_SERVER_PRIVATE_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/demo.pem

[db:vars]
# Routes Ansible traffic through the Web Server to reach the private DB instance
ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -q -i ~/.ssh/demo.pem ubuntu@<WEB_SERVER_PUBLIC_IP> -o StrictHostKeyChecking=no"'